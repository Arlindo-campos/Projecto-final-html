<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>SGE - Sistema de Notas</title>

<style>
body {
font-family: Arial;
background: #12121c;
color: white;
margin: 0;
padding: 0;
}

.container {
max-width: 900px;
margin: auto;
padding: 20px;
}

h1, h2 {
text-align: center;
}

.form-box {
background: rgba(255,255,255,0.08);
padding: 20px;
border-radius: 10px;
margin-bottom: 20px;
}

.campo {
margin-bottom: 12px;
display: flex;
flex-direction: column;
}

input {
padding: 10px;
border-radius: 5px;
border: none;
}

.botoes {
display: flex;
gap: 10px;
}

button {
flex: 1;
padding: 10px;
border: none;
cursor: pointer;
font-weight: bold;
border-radius: 5px;
}

button[type="submit"] { background: #007bff; color: white; }
button[type="button"] { background: #dc3545; color: white; }

.resultado {
margin-top: 15px;
padding: 15px;
background: rgba(0,0,0,0.4);
border-radius: 8px;
}

.aprovado { color: #00ff88; }
.reprovado { color: #ff4d4d; }

.tabela {
margin-top: 20px;
width: 100%;
border-collapse: collapse;
}

.tabela th, .tabela td {
border: 1px solid #444;
padding: 8px;
text-align: center;
}

canvas {
background: white;
border-radius: 10px;
margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>SGE - Sistema de Notas</h1>

<div class="form-box">
<form onsubmit="adicionarAluno(event)">

<div class="campo">
<label>Nome do Aluno</label>
<input type="text" id="nome">
</div>

<div class="campo">
<label>Nota 1</label>
<input type="number" id="n1" min="0" max="20">
</div>

<div class="campo">
<label>Nota 2</label>
<input type="number" id="n2" min="0" max="20">
</div>

<div class="campo">
<label>Nota 3</label>
<input type="number" id="n3" min="0" max="20">
</div>

<div class="botoes">
<button type="submit">Adicionar</button>
<button type="button" onclick="limparTudo()">Limpar Tudo</button>
</div>

</form>

<div id="resultado" class="resultado"></div>
</div>

<h2>📊 Gráfico de Médias</h2>
<canvas id="grafico" width="800" height="300"></canvas>

<h2>📋 Histórico de Alunos</h2>
<table class="tabela">
<thead>
<tr>
<th>Nome</th>
<th>Média</th>
<th>Situação</th>
<th>Classificação</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>

let alunos = JSON.parse(localStorage.getItem("alunos")) || [];

function adicionarAluno(e) {
e.preventDefault();

const nome = document.getElementById("nome").value.trim();
const n1 = Number(document.getElementById("n1").value);
const n2 = Number(document.getElementById("n2").value);
const n3 = Number(document.getElementById("n3").value);

const media = (n1 + n2 + n3) / 3;

let situacao = media >= 10 ? "Aprovado" : "Reprovado";
let classificacao;

if (media >= 17) classificacao = "Excelente";
else if (media >= 14) classificacao = "Bom";
else if (media >= 10) classificacao = "Suficiente";
else classificacao = "Insuficiente";

const aluno = { nome, media: media.toFixed(2), situacao, classificacao };

alunos.push(aluno);
localStorage.setItem("alunos", JSON.stringify(alunos));

mostrarResultado(aluno);
atualizarTabela();
desenharGrafico();

e.target.reset();
}

function mostrarResultado(a) {
document.getElementById("resultado").innerHTML = `
<p><strong>${a.nome}</strong></p>
<p>Média: ${a.media}</p>
<p class="${a.situacao.toLowerCase()}">${a.situacao}</p>
`;
}

function atualizarTabela() {
const tabela = document.getElementById("tabela");
tabela.innerHTML = "";

alunos.forEach(a => {
tabela.innerHTML += `
<tr>
<td>${a.nome}</td>
<td>${a.media}</td>
<td>${a.situacao}</td>
<td>${a.classificacao}</td>
</tr>`;
});
}

function desenharGrafico() {
const canvas = document.getElementById("grafico");
const ctx = canvas.getContext("2d");

ctx.clearRect(0, 0, canvas.width, canvas.height);

const max = 20;
const largura = 50;

alunos.forEach((a, i) => {
const altura = (a.media / max) * 250;

ctx.fillStyle = "#007bff";
ctx.fillRect(i * (largura + 10), 250 - altura, largura, altura);

ctx.fillStyle = "black";
ctx.fillText(a.nome, i * (largura + 10), 270);
});
}

function limparTudo() {
alunos = [];
localStorage.removeItem("alunos");
atualizarTabela();
desenharGrafico();
document.getElementById("resultado").innerHTML = "";
}

atualizarTabela();
desenharGrafico();

</script>

</body>
</html>
